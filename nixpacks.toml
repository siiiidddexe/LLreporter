# nixpacks.toml
# Configures Nixpacks builds (used by Dokploy "Application" type).
# Ensures prisma db push + seed run before Next.js starts.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "sqlite", "zip"]

[phases.install]
cmds = ["npm ci --no-audit --no-fund"]

[phases.build]
cmds = [
  "cd web && DATABASE_URL='file:/tmp/build.db' npx prisma generate && cd .. && npm run build"
]

[start]
cmd = "mkdir -p /data /data/uploads && chmod 0777 /data /data/uploads && ([ -L /app/web/public/uploads ] || (find /app/web/public/uploads -type f -exec mv {} /data/uploads/ \\; 2>/dev/null; rm -rf /app/web/public/uploads; ln -sfn /data/uploads /app/web/public/uploads)) && cd web && SCHEMA_HASH=$(sha256sum prisma/schema.prisma | awk '{print $1}') && PREV_HASH=$(cat /data/.schema-hash 2>/dev/null || echo '') && if [ ! -f /data/llreporter.db ] || [ \"$PREV_HASH\" != \"$SCHEMA_HASH\" ]; then echo \"[start] schema changed or new DB — running prisma db push\"; npx prisma db push --skip-generate && echo \"$SCHEMA_HASH\" > /data/.schema-hash; else echo \"[start] schema unchanged — preserving DB\"; fi && node prisma/seed.js && cd .. && npm run start"
