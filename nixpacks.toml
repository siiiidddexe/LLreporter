# nixpacks.toml
# Configures Nixpacks builds (used by Dokploy "Application" type).
# Ensures prisma db push + seed run before Next.js starts.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "sqlite", "zip", "coreutils"]

[phases.install]
cmds = ["npm ci --no-audit --no-fund"]

[phases.build]
cmds = [
  "cd web && DATABASE_URL='file:/tmp/build.db' npx prisma generate && cd .. && npm run build"
]

[start]
# 1. Ensure /data and /data/uploads exist and are writable (persistent volume mount point).
# 2. Only run prisma db push when schema changed or DB is new — preserves data across redeploys.
# 3. Seed (idempotent upserts) and start Next.js.
# Note: uploads are served via the /uploads/[...slug] route handler which reads from
# /data/uploads directly — no public/uploads symlink needed in production.
cmd = "mkdir -p /data /data/uploads && chmod 0777 /data /data/uploads && cd web && SCHEMA_HASH=$(sha256sum prisma/schema.prisma | awk '{print $1}') && PREV_HASH=$(cat /data/.schema-hash 2>/dev/null || echo '') && if [ ! -f /data/llreporter.db ] || [ \"$PREV_HASH\" != \"$SCHEMA_HASH\" ]; then echo \"[start] schema changed or new DB — running prisma db push\"; npx prisma db push --skip-generate && echo \"$SCHEMA_HASH\" > /data/.schema-hash; else echo \"[start] schema unchanged — preserving DB\"; fi && node prisma/seed.js && cd .. && npm run start"
