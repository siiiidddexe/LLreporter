# nixpacks.toml
# Configures Nixpacks builds (used by Dokploy "Application" type).
# Ensures prisma db push + seed run before Next.js starts.

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "sqlite"]

[phases.install]
cmds = ["npm ci --no-audit --no-fund"]

[phases.build]
cmds = [
  "cd web && DATABASE_URL='file:/tmp/build.db' npx prisma generate && cd .. && npm run build"
]

[start]
# After the volume mounts at /data:
#  1. ensure /data exists and is writable
#  2. only run `prisma db push` when schema.prisma has changed (or DB is new)
#     — this preserves user data across redeploys.
#     `--accept-data-loss` is intentionally omitted; destructive migrations
#     should fail loudly so they can be reviewed.
#  3. seed (idempotent upserts) and start Next.js
cmd = "mkdir -p /data && chmod 0777 /data && cd web && SCHEMA_HASH=$(sha256sum prisma/schema.prisma | awk '{print $1}') && PREV_HASH=$(cat /data/.schema-hash 2>/dev/null || echo '') && if [ ! -f /data/llreporter.db ] || [ \"$PREV_HASH\" != \"$SCHEMA_HASH\" ]; then echo \"[start] schema changed or new DB — running prisma db push\"; npx prisma db push --skip-generate && echo \"$SCHEMA_HASH\" > /data/.schema-hash; else echo \"[start] schema unchanged — preserving DB\"; fi && node prisma/seed.js && cd .. && npm run start"
