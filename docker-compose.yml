version: "3.9"

# Single-container, zero-setup LLReporter.
# SQLite lives on a named volume so data survives redeploys.
# All env vars have sensible defaults — override NEXTAUTH_SECRET in production.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:/app/web/data/llreporter.db"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-llreporter-default-secret-please-override-in-production-aZbYcXdWeVfUgThSiRjQkPlOmN}
      PUBLIC_URL: ${PUBLIC_URL:-https://webaudit.logiclaunch.in}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@logiclaunch.in}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Super Admin}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - data:/app/web/data              # SQLite DB file lives here
      - uploads:/app/web/public/uploads # screenshot uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  data:
  uploads:
