version: "3.9"

# LLReporter — single container, embedded SQLite, zero setup.
# SQLite lives at /data inside the container, on a named volume.
# All env vars have defaults — only NEXTAUTH_SECRET needs overriding in prod.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # /data is a clean top-level mount — avoids app-dir volume conflicts.
      DATABASE_URL: "file:/data/llreporter.db"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-llreporter-default-secret-please-override-in-production-aZbYcXdWeVfUgThSiRjQkPlOmN}
      PUBLIC_URL: ${PUBLIC_URL:-https://webaudit.logiclaunch.in}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@logiclaunch.in}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-!Hesoyam3451}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Super Admin}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - data:/data  # SQLite DB + uploads both live under /data (persistent across redeploys)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  data:
