# Dokploy v0.26.7 metadata
# https://dokploy.com
name: llreporter
version: 0.1.0
description: LLReporter bug platform (web + extension + connector)
type: compose
compose: docker-compose.yml
domains:
  - host: webaudit.logiclaunch.in
    service: web
    port: 3000
    https: true
    certResolver: letsencrypt
env:
  required:
    - NEXTAUTH_SECRET
    - DATABASE_URL
    - PUBLIC_URL
  optional:
    - SEED_ADMIN_EMAIL
    - SEED_ADMIN_PASSWORD
    - SEED_ADMIN_NAME
healthcheck:
  path: /api/health
  interval: 30
