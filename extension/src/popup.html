<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LLReporter</title>
  <style>
    body { margin: 0; width: 320px; font-family: Inter, system-ui, sans-serif; background: #0d1016; color: #f5f7fa; }
    .p { padding: 14px 16px; }
    .kicker { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: #2f7dff; }
    .title { font-size: 16px; font-weight: 600; margin-top: 2px; }
    .sub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 3px; }
    label { display: block; font-size: 10px; color: rgba(255,255,255,.6); margin-top: 10px; margin-bottom: 4px; }
    input { width: 100%; background: rgba(13,16,22,.6); border: 1px solid #1a1f2b; border-radius: 6px; padding: 6px 8px; color: #f5f7fa; font-size: 12px; box-sizing: border-box; }
    button { width: 100%; margin-top: 10px; background: #2f7dff; border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
    button.secondary { background: transparent; border: 1px solid #1a1f2b; color: #f5f7fa; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1 }
    .err { color: #fca5a5; font-size: 11px; margin-top: 6px; min-height: 14px; }
    .ok { color: #86efac; font-size: 11px; margin-top: 6px; }
    hr { border: 0; border-top: 1px solid #1a1f2b; margin: 12px 0; }
    .me { font-size: 12px; }
    .me b { color: white }
    code { background: rgba(47,125,255,.12); color: #b7d0ff; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="p">
    <div class="kicker">logiclaunch</div>
    <div class="title">LLReporter</div>
    <div class="sub">Press <code>⌘K</code> / <code>Ctrl+K</code> on any page to report a bug.</div>
    <div id="view"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
